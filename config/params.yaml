frontier_explorer:
  ros__parameters:
    # Topics and action
    map_topic: map
    costmap_topic: global_costmap/costmap
    local_costmap_topic: local_costmap/costmap
    navigate_to_pose_action_name: navigate_to_pose

    # Frames
    global_frame: map
    robot_base_frame: base_footprint

    # Visualization
    frontier_marker_topic: explore/frontiers
    frontier_marker_scale: 0.15

    # QoS (recommended normal path: explicit params)
    map_qos_durability: transient_local
    map_qos_reliability: reliable
    map_qos_depth: 1
    map_qos_autodetect_on_startup: false
    map_qos_autodetect_timeout_s: 2.0
    costmap_qos_reliability: reliable
    costmap_qos_depth: 10
    local_costmap_qos_reliability: inherit
    local_costmap_qos_depth: -1

    # Exploration behavior
    frontier_min_distance: 0.5
    frontier_visit_tolerance: 0.30
    # Reconsider the active frontier goal when the frontier becomes revealed by map growth.
    goal_preemption_on_frontier_revealed: false
    goal_preemption_on_blocked_goal: false
    # Minimum seconds between consecutive frontier-revealed preemption attempts.
    goal_preemption_min_interval_s: 2.0
    # Skip frontier-revealed preemption when the robot is already close to the active target.
    goal_preemption_skip_if_within_m: 0.75
    # When frontier-revealed preemption is enabled, treat the active frontier as complete once the robot is this close to the target; 0 disables this shortcut.
    # Useful for making the visible-gain gate less aggressive near arrival, but robots that must avoid obstacles conservatively should keep this small because large values can finish a frontier too early and lead to wrong exploration decisions.
    goal_preemption_complete_if_within_m: 0.0
    # Keep the active goal even if the frontier is already revealed when the target pose can still reveal useful frontier.
    goal_preemption_visible_gain_gate_enabled: false
    # Sensor-model range used by the visible frontier gain gate above.
    goal_preemption_visible_gain_range_m: 12.0
    # Sensor-model FOV used by the visible frontier gain gate above.
    goal_preemption_visible_gain_fov_deg: 360.0
    # Ray spacing used by the visible frontier gain gate above.
    goal_preemption_visible_gain_ray_step_deg: 1.0
    # Minimum visible frontier length required to keep the active goal even after the frontier is revealed.
    goal_preemption_visible_gain_min_frontier_length_m: 0.5
    # Additional heading offset applied by the visible frontier gain gate above.
    goal_preemption_visible_gain_yaw_offset_deg: 0.0
    escape_enabled: true
    post_goal_min_settle: 0.80
    post_goal_required_map_updates: 3
    post_goal_stable_updates: 2
    return_to_start_on_complete: true
    all_frontiers_suppressed_behavior: stay
    frontier_suppression_enabled: false
    frontier_suppression_attempt_threshold: 3
    frontier_suppression_base_size_m: 1.0
    frontier_suppression_expansion_size_m: 0.5
    frontier_suppression_timeout_s: 90.0
    frontier_suppression_no_progress_timeout_s: 20.0
    frontier_suppression_progress_epsilon_m: 0.05
    frontier_suppression_startup_grace_period_s: 15.0
    frontier_suppression_max_attempt_records: 256
    frontier_suppression_max_regions: 64

    # Optional completion event for external integrations.
    completion_event_enabled: false
    completion_event_topic: exploration_complete
